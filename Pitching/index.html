<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MB Sense Pitch Queue</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070b;
      color: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05070b;
    }

    body {
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .deck {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      opacity: 0;
      z-index: 1;
    }

    .deck.is-active {
      opacity: 1;
      z-index: 2;
    }

  </style>
</head>
<body>
  <main class="stage" aria-label="Pitch video queue">
    <video id="playerA" class="deck is-active" playsinline preload="auto"></video>
    <video id="playerB" class="deck" playsinline preload="auto"></video>
  </main>

  <script>
    const queue = [
      'F1.mp4',
      'F2.mp4',
      'F3.mp4',
      'F4.mp4',
      'F5.mp4',
      'F6.mp4',
      'F7.mp4',
      'F8.mp4',
      'F9.mp4',
      'F10.mp4',
      'F11.mp4',
    ];

    const players = [
      document.getElementById('playerA'),
      document.getElementById('playerB'),
    ];
    let index = 0;
    let activeSlot = 0;
    let hasStarted = false;
    let isSwitching = false;

    function clampIndex(nextIndex) {
      return Math.max(0, Math.min(queue.length - 1, nextIndex));
    }

    function setVideoSource(video, src) {
      if (video.dataset.src === src) {
        return;
      }

      video.dataset.src = src;
      video.src = src;
      video.load();
    }

    function restart(video) {
      try {
        video.currentTime = 0;
      } catch {
        // The source is still loading; a fresh source starts from zero anyway.
      }
    }

    function waitForFrame(video) {
      if (video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
        return Promise.resolve();
      }

      return new Promise((resolve, reject) => {
        const cleanup = () => {
          video.removeEventListener('loadeddata', resolveFrame);
          video.removeEventListener('canplay', resolveFrame);
          video.removeEventListener('error', rejectFrame);
        };
        const resolveFrame = () => {
          cleanup();
          resolve();
        };
        const rejectFrame = () => {
          cleanup();
          reject(new Error('Video failed to load.'));
        };

        video.addEventListener('loadeddata', resolveFrame);
        video.addEventListener('canplay', resolveFrame);
        video.addEventListener('error', rejectFrame);
      });
    }

    function preloadNext(direction = 1) {
      const preloadIndex = clampIndex(index + direction);
      const standby = players[1 - activeSlot];

      setVideoSource(standby, queue[preloadIndex]);
    }

    async function playVisibleCurrent() {
      const player = players[activeSlot];
      setVideoSource(player, queue[index]);

      try {
        const playPromise = player.play();
        await Promise.all([waitForFrame(player), playPromise ?? Promise.resolve()]);
        document.body.classList.add('is-playing');
        preloadNext(1);
      } catch {
        document.body.classList.remove('is-playing');
      }
    }

    async function switchTo(nextIndex, direction) {
      if (isSwitching) {
        return;
      }

      isSwitching = true;

      const current = players[activeSlot];
      const nextSlot = 1 - activeSlot;
      const next = players[nextSlot];
      const wasMuted = next.muted;

      setVideoSource(next, queue[nextIndex]);
      restart(next);
      next.muted = true;

      try {
        const playPromise = next.play();
        await Promise.all([waitForFrame(next), playPromise ?? Promise.resolve()]);

        next.classList.add('is-active');
        current.classList.remove('is-active');
        current.pause();
        next.muted = wasMuted;

        activeSlot = nextSlot;
        index = nextIndex;
        document.body.classList.add('is-playing');
        preloadNext(direction);
      } catch {
        next.pause();
        next.muted = wasMuted;
        document.body.classList.toggle('is-playing', !current.paused);
      } finally {
        isSwitching = false;
      }
    }

    function startOrMove(direction = 1) {
      if (!hasStarted) {
        hasStarted = true;
        void playVisibleCurrent();
        return;
      }

      const nextIndex = clampIndex(index + direction);

      if (nextIndex === index) {
        restart(players[activeSlot]);
        void playVisibleCurrent();
        return;
      }

      void switchTo(nextIndex, direction);
    }

    window.addEventListener('click', () => startOrMove(1));

    window.addEventListener('keydown', (event) => {
      const forwardKeys = ['ArrowRight', 'ArrowDown'];
      const backKeys = ['ArrowLeft', 'ArrowUp'];

      if (forwardKeys.includes(event.key)) {
        event.preventDefault();
        startOrMove(1);
      }

      if (backKeys.includes(event.key)) {
        event.preventDefault();
        startOrMove(-1);
      }
    });

    players.forEach((player) => {
      player.addEventListener('ended', () => {
        document.body.classList.remove('is-playing');
      });
    });

    setVideoSource(players[activeSlot], queue[index]);
    preloadNext(1);
  </script>
</body>
</html>
