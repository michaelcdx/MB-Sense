services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      PORT: 8000
      NODE_ENV: production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        GOOGLE_MAPS_PLATFORM_KEY: ${GOOGLE_MAPS_PLATFORM_KEY:-}
        VITE_GOOGLE_MAPS_PLATFORM_KEY: ${VITE_GOOGLE_MAPS_PLATFORM_KEY:-}
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY:-}
        VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://localhost:8000}
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

